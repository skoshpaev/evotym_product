services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - ./:/workspace/product
      - composer-cache:/tmp/composer-cache
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]

volumes:
  composer-cache:
