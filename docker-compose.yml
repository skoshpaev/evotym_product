services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace/product
    environment:
      APP_ENV: dev
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      API_TOKEN: "${API_TOKEN:-product-dev-token}"
      DATABASE_URL: "mysql://product:product@mysql:3306/product?serverVersion=8.0&charset=utf8mb4"
    volumes:
      - ./:/workspace/product
      - composer-cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php-fpm"]
    networks:
      - default
      - shared

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8081:80"
    volumes:
      - ./:/workspace/product:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: product
      MYSQL_USER: product
      MYSQL_PASSWORD: product
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  composer-cache:
  mysql-data:

networks:
  shared:
    name: evotym_shared
